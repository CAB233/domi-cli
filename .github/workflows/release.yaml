name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.1.3)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: |
          sudo apt update -y
          sudo apt install protobuf-compiler llvm -y
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare release asset
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/domi-cli"
          llvm-strip -s "$src" -o "dist/domi-cli-${{ matrix.target }}"
          llvm-strip --only-keep-debug "$src" -o "dist/domi-cli-${{ matrix.target }}-debug"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        if: github.event.inputs.tag != '' || github.ref_type == 'tag'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: dist/*
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref }}
